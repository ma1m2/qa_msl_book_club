openapi: 3.0.3
info:
  title: Book Club API
  version: 0.0.0 (v1)
  description: So great, needs no docs
paths:
  /api/v1/auth/logout/:
    post:
      operationId: authLogoutCreate
      description: |-
        Takes a token and blacklists it. Must be used with the
        `rest_framework_simplejwt.token_blacklist` app installed.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBlacklist'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenBlacklist'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenBlacklist'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenBlacklist'
          description: ''
  /api/v1/auth/token/:
    post:
      operationId: authTokenCreate
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairWithProperMessage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairWithProperMessage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairWithProperMessage'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPairWithProperMessage'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: authTokenRefreshCreate
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/clubs/:
    get:
      operationId: clubsList
      parameters:
      - in: query
        name: membership
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClubList'
          description: ''
    post:
      operationId: clubsCreate
      tags:
      - clubs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Club'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Club'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Club'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Club'
          description: ''
  /api/v1/clubs/{id}/:
    get:
      operationId: clubsRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Club.
        required: true
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Club'
          description: ''
    put:
      operationId: clubsUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Club.
        required: true
      tags:
      - clubs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Club'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Club'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Club'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Club'
          description: ''
    patch:
      operationId: clubsPartialUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Club.
        required: true
      tags:
      - clubs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClub'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClub'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClub'
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Club'
          description: ''
    delete:
      operationId: clubsDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Club.
        required: true
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/clubs/{id}/members/me/:
    post:
      operationId: clubsMembersMeCreate
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Club.
        required: true
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
    delete:
      operationId: clubsMembersMeDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Club.
        required: true
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/clubs/reviews/:
    get:
      operationId: clubsReviewsList
      parameters:
      - in: query
        name: club
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookReviewList'
          description: ''
    post:
      operationId: clubsReviewsCreate
      tags:
      - clubs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookReview'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookReview'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookReview'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookReview'
          description: ''
  /api/v1/clubs/reviews/{id}/:
    get:
      operationId: clubsReviewsRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Review.
        required: true
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookReview'
          description: ''
    put:
      operationId: clubsReviewsUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Review.
        required: true
      tags:
      - clubs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookReview'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookReview'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookReview'
        required: true
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookReview'
          description: ''
    patch:
      operationId: clubsReviewsPartialUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Review.
        required: true
      tags:
      - clubs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBookReview'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBookReview'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBookReview'
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookReview'
          description: ''
    delete:
      operationId: clubsReviewsDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Book Review.
        required: true
      tags:
      - clubs
      security:
      - jwtAuth: []
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/docs/schema/:
    get:
      operationId: docsSchemaRetrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
