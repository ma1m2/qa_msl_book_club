components:
  schemas:
    BookReview:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        club:
          type: integer
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        review:
          type: string
          title: Book Review
        assessment:
          type: integer
          maximum: 5
          minimum: 1
        readPages:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        created:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания
        modified:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Дата изменения
      required:
      - assessment
      - club
      - created
      - id
      - modified
      - readPages
      - review
      - user
    Club:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bookTitle:
          type: string
          maxLength: 255
        bookAuthors:
          type: string
          maxLength: 255
        publicationYear:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        description:
          type: string
          title: Book Description
        telegramChatLink:
          type: string
          format: uri
          title: Link on Telegram chat
          maxLength: 200
        owner:
          type: integer
          readOnly: true
        members:
          type: array
          items:
            type: integer
          readOnly: true
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/BookReview'
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания
        modified:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Дата изменения
      required:
      - bookAuthors
      - bookTitle
      - created
      - description
      - id
      - members
      - modified
      - owner
      - publicationYear
      - reviews
      - telegramChatLink
    PaginatedBookReviewList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/BookReview'
    PaginatedClubList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Club'
    PatchedBookReview:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        club:
          type: integer
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        review:
          type: string
          title: Book Review
        assessment:
          type: integer
          maximum: 5
          minimum: 1
        readPages:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        created:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания
        modified:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Дата изменения
    PatchedClub:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bookTitle:
          type: string
          maxLength: 255
        bookAuthors:
          type: string
          maxLength: 255
        publicationYear:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        description:
          type: string
          title: Book Description
        telegramChatLink:
          type: string
          format: uri
          title: Link on Telegram chat
          maxLength: 200
        owner:
          type: integer
          readOnly: true
        members:
          type: array
          items:
            type: integer
          readOnly: true
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/BookReview'
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания
        modified:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Дата изменения
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        firstName:
          type: string
          maxLength: 150
        lastName:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        remoteAddr:
          type: string
          readOnly: true
    TokenBlacklist:
      type: object
      properties:
        refresh:
          type: string
          writeOnly: true
      required:
      - refresh
    TokenObtainPairWithProperMessage:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
      required:
      - id
      - username
    UserRegister:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          maxLength: 128
      required:
      - password
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
